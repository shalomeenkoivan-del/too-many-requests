<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Nexus | Too Many Requests</title>
  <style>
    :root {
      --bg: #040707;
      --panel: rgba(6, 18, 16, 0.82);
      --neon: #00ff88;
      --warn: #ff7f50;
      --text: #d8ffe8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: "Courier New", Consolas, monospace; overflow: hidden; }
    #matrix {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.35;
      z-index: 0;
    }
    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
      );
      animation: scan 7s linear infinite;
    }
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.12;
      background-image:
        radial-gradient(rgba(255,255,255,0.35) 0.4px, transparent 0.8px);
      background-size: 3px 3px;
      animation: noiseShift 0.25s steps(2) infinite;
    }
    @keyframes noiseShift {
      0% { transform: translate(0, 0); }
      50% { transform: translate(1px, -1px); }
      100% { transform: translate(-1px, 1px); }
    }
    @keyframes scan { from { transform: translateY(-20%);} to { transform: translateY(20%);} }
    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 96vw);
      background: var(--panel);
      border: 1px solid rgba(0,255,136,0.45);
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0,255,136,0.2), inset 0 0 40px rgba(0,255,136,0.06);
      padding: 30px 30px 24px;
      backdrop-filter: blur(5px);
      position: relative;
      overflow: hidden;
    }
    .card:before {
      content: "";
      position: absolute;
      inset: -120% -50%;
      background: conic-gradient(from 180deg, transparent, rgba(0,255,136,0.08), transparent 35%);
      animation: rotate 6s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .content { position: relative; z-index: 1; text-align: center; }
    .code {
      font-size: clamp(42px, 9vw, 92px);
      margin: 0 0 6px;
      color: var(--warn);
      text-shadow: 0 0 18px rgba(255,127,80,0.45);
      letter-spacing: 2px;
    }
    .title {
      margin: 0 0 16px;
      font-size: clamp(20px, 3vw, 34px);
      color: var(--neon);
      text-shadow: 0 0 16px rgba(0,255,136,0.45);
      position: relative;
    }
    .title.glitch::before,
    .title.glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
      pointer-events: none;
    }
    .title.glitch::before {
      color: rgba(0,255,136,0.55);
      transform: translateX(-1px);
      animation: glitchA 2.7s infinite linear alternate-reverse;
    }
    .title.glitch::after {
      color: rgba(120,255,200,0.45);
      transform: translateX(1px);
      animation: glitchB 2.1s infinite linear alternate-reverse;
    }
    @keyframes glitchA {
      0% { clip-path: inset(0 0 85% 0); }
      25% { clip-path: inset(50% 0 30% 0); }
      50% { clip-path: inset(15% 0 65% 0); }
      75% { clip-path: inset(70% 0 15% 0); }
      100% { clip-path: inset(0 0 82% 0); }
    }
    @keyframes glitchB {
      0% { clip-path: inset(80% 0 2% 0); }
      20% { clip-path: inset(10% 0 70% 0); }
      45% { clip-path: inset(55% 0 28% 0); }
      70% { clip-path: inset(25% 0 52% 0); }
      100% { clip-path: inset(84% 0 0 0); }
    }
    .desc {
      margin: 0 0 14px;
      line-height: 1.6;
      font-size: clamp(14px, 2vw, 18px);
      color: #bdf8d7;
      max-width: 74ch;
      text-align: left;
      margin-left: auto;
      margin-right: auto;
    }
    .warn {
      margin-top: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(255,127,80,0.5);
      border-radius: 10px;
      background: rgba(255,127,80,0.08);
      color: #ffd0c0;
      line-height: 1.5;
      text-align: left;
      margin-left: auto;
      margin-right: auto;
      max-width: 74ch;
    }
    .status-line {
      margin: 14px 0 0;
      font-size: 12px;
      color: #9cebc4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .dots {
      display: inline-flex;
      gap: 5px;
      vertical-align: middle;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(0,255,136,0.45);
      box-shadow: 0 0 8px rgba(0,255,136,0.45);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 100% { transform: scale(0.8); opacity: 0.45; }
      50% { transform: scale(1.2); opacity: 1; }
    }
    .pulse {
      display: inline-block;
      animation: pulse 1.3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 8px rgba(0,255,136,0.25); }
      50% { opacity: 0.7; text-shadow: 0 0 20px rgba(0,255,136,0.8); }
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>
  <main class="wrap">
    <section class="card" role="alert" aria-live="polite">
      <div class="content">
        <h1 class="code">429</h1>
        <h2 class="title glitch" data-text="Too Many Requests">Too Many Requests</h2>
        <p class="desc">
          You are sending requests too fast. Slow down and try again in a moment.
          The Shadow corridor is still open, but rate limits protect all nodes.
        </p>
        <div class="warn">
          <strong class="pulse">Warning:</strong>
          Repeated rate limit violations may lead to a temporary or permanent ban.
        </div>
        <div class="status-line">
          Threat monitor active
          <span class="dots" aria-hidden="true">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </span>
        </div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");
      const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-";
      let w = 0, h = 0, font = 16, cols = 0, drops = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cols = Math.max(1, Math.floor(w / font));
        drops = Array(cols).fill(0).map(() => Math.random() * h / font);
      }
      function draw() {
        ctx.fillStyle = "rgba(4,7,7,0.14)";
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#00ff88";
        ctx.font = font + "px monospace";
        for (let i = 0; i < cols; i++) {
          const ch = chars[(Math.random() * chars.length) | 0];
          const x = i * font;
          const y = drops[i] * font;
          ctx.fillText(ch, x, y);
          if (y > h && Math.random() > 0.975) drops[i] = 0;
          drops[i] += 0.75;
        }
      }
      resize();
      window.addEventListener("resize", resize, { passive: true });
      setInterval(draw, 34);
    })();
  </script>
</body>
</html>
